<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Garden</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black">

  <div class="min-h-screen flex items-center justify-center p-6 font-mono">
    <div class="bg-white/10 backdrop-blur-md border border-white/20 rounded-3xl p-8 shadow-2xl w-full max-w-md text-white">
      
      <h2 class="text-2xl font-bold mb-6 text-center tracking-widest text-cyan-400">SMART GARDEN HUD</h2>
      
      <div class="space-y-6">
        <div class="flex justify-between items-center border-b border-white/10 pb-2">
          <span class="text-gray-400 uppercase text-xs">Soil Moisture</span>
          <span id="moisture" class="text-2xl font-bold text-green-400">--%</span>
        </div>

        <div class="flex justify-between items-center border-b border-white/10 pb-2">
          <span class="text-gray-400 uppercase text-xs">Temperature</span>
          <span id="temp" class="text-2xl font-bold text-orange-400">--°C</span>
        </div>

        <div class="flex justify-between items-center">
          <span class="text-gray-400 uppercase text-xs">Pump Status</span>
          <div id="status-indicator" class="flex items-center gap-2">
            <div id="status-dot" class="w-3 h-3 rounded-full bg-gray-500 shadow-[0_0_10px_rgba(255,255,255,0.5)]"></div>
            <span id="status-text" class="font-bold uppercase tracking-tighter">OFFLINE</span>
          </div>
        </div>
      </div>
      
    </div>
  </div>

  <script>
    // I noticed you already put your token in, so I've included it here!
    const BLYNK_TOKEN = "3u3KRx9ufZraw38uzQ3EbucGv-elvIhb";

    async function updateDashboard() {
      try {
        const response = await fetch(`https://blynk.cloud/external/api/get?token=${BLYNK_TOKEN}&v0&v1&v3`);
        const data = await response.json();

        // Update Moisture and Temp
        document.getElementById('moisture').innerText = data.v0 + "%";
        document.getElementById('temp').innerText = data.v1 + "°C";

        // Update Pump Status UI
        const statusText = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');

        if (data.v3 == 1) {
          statusText.innerText = "ACTIVE";
          statusText.className = "text-cyan-400 font-bold tracking-tighter animate-pulse";
          statusDot.className = "w-3 h-3 rounded-full bg-cyan-400 shadow-[0_0_15px_#22d3ee]";
        } else {
          statusText.innerText = "IDLE";
          statusText.className = "text-gray-500 font-bold tracking-tighter";
          statusDot.className = "w-3 h-3 rounded-full bg-gray-600";
        }
      } catch (error) {
        console.error("Blynk API Error:", error);
      }
    }

    // Update every 3 seconds
    setInterval(updateDashboard, 3000);
    updateDashboard(); // Initial call
  </script>

</body>
</html>
